name = "ai-arena-backend"
main = "worker.js"
compatibility_date = "2025-11-01"

# Секрет ANTHROPIC_API_KEY хранится НА воркере (Cloudflare), не в коде и не в гите —
# при авто-деплое из гита он остаётся на месте (деплой кода секретов не трогает).
#
# Защита кошелька на публичной странице:
#   • жёсткие потолки в worker.js (раундов ≤ 5, короткий ответ) — потолок цены одного вызова;
#   • ГЛАВНОЕ — месячный лимит трат в console.anthropic.com.
# (Пер-IP лимит вернём позже отдельным слоем — сейчас держим конфиг простым ради чистого авто-деплоя.)
